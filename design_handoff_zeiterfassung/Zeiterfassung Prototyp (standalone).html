  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n            <div style=\"font-family:'Petrona',serif; font-weight:600; font-size:46px; line-height:1; text-align:center; color:#333; letter-spacing:1px; margin-bottom:14px; font-variant-numeric:tabular-nums;\">{{ timer.text }}<\u002Fdiv>\n            <div style=\"display:flex; gap:9px; margin-bottom:9px;\">\n              <button onclick=\"{{ timer.toggle }}\" style=\"{{ timer.toggleStyle }}\">{{ timer.toggleLabel }}<\u002Fbutton>\n              <button onclick=\"{{ timer.reset }}\" style=\"flex:none; font-family:'Aleo',sans-serif; font-size:14px; cursor:pointer; color:#6E6E6E; background:#fff; border:1px solid #E5E7EC; border-radius:999px; padding:11px 18px;\">Reset<\u002Fbutton>\n            <\u002Fdiv>\n            <button onclick=\"{{ timer.transfer }}\" style=\"width:100%; font-family:'Aleo',sans-serif; font-weight:600; font-size:14px; cursor:pointer; color:#333; background:#F7B234; border:none; border-radius:999px; padding:11px;\" style-hover=\"background:#E5A11C;\">{{ timer.transferText }} in Karte übertragen<\u002Fbutton>\n            <div style=\"font-size:11.5px; color:#9aa0ab; margin-top:9px; text-align:center;\">Alternativ Dauer manuell nachtragen. Übertragene Zeit → „nicht freigegeben\".<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Erfasste Zeiten -->\n          <div>\n            <div style=\"font-family:'Petrona',serif; font-weight:600; font-size:16px; margin-bottom:9px;\">Erfasste Zeiten<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px;\">\n              <sc-for list=\"{{ detail.times }}\" as=\"z\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:13.5px; border-bottom:1px solid #F0F1F4; padding-bottom:7px;\">\n                  <span style=\"color:#6E6E6E;\">{{ z.datum }}<\u002Fspan>\n                  <span style=\"font-weight:600; color:#333;\">{{ z.dauer }}<\u002Fspan>\n                  <span style=\"{{ z.badgeStyle }}\">{{ z.status }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Checkliste (editierbar) -->\n          <div>\n            <div style=\"font-family:'Petrona',serif; font-weight:600; font-size:16px; margin-bottom:9px;\">Unterlagen-Checkliste<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:7px;\">\n              <sc-for list=\"{{ detail.checklist }}\" as=\"u\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:10px;\">\n                  <span onclick=\"{{ u.onToggle }}\" style=\"{{ u.boxStyle }}\">{{ u.mark }}<\u002Fspan>\n                  <span style=\"{{ u.textStyle }}\">{{ u.label }}<\u002Fspan>\n                  <button onclick=\"{{ u.onDelete }}\" title=\"Löschen\" style=\"flex:none; width:24px; height:24px; border:none; background:transparent; color:#B7BCC6; cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:#FBE4DB; color:#E94E1B;\">\n                    <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:8px; margin-top:10px;\">\n              <input value=\"{{ detail.checklistDraft }}\" onchange=\"{{ detail.onChecklistDraft }}\" onkeydown=\"{{ detail.onChecklistKey }}\" placeholder=\"Unterlage hinzufügen …\" style=\"flex:1; min-width:0; border:1.5px solid #E5E7EC; border-radius:8px; padding:8px 11px; font-family:'Aleo',sans-serif; font-size:13.5px; outline:none; color:#333;\">\n              <button onclick=\"{{ detail.addChecklistItem }}\" style=\"flex:none; font-family:'Aleo',sans-serif; font-size:13.5px; font-weight:600; cursor:pointer; color:#0080C9; background:#EAF4FB; border:none; border-radius:8px; padding:8px 14px;\" style-hover=\"background:#D9ECF8;\">Hinzufügen<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Review Notes (Rollen + Thread) -->\n        <div style=\"grid-column:1 / -1; border-top:1px solid #E5E7EC; padding-top:18px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:14px;\">\n            <span style=\"width:8px; height:8px; border-radius:50%; background:#F7B234;\"><\u002Fspan>\n            <span style=\"font-family:'Petrona',serif; font-weight:600; font-size:18px;\">Review Notes<\u002Fspan>\n            <span style=\"font-size:12.5px; color:#6E6E6E;\">{{ detail.openNotes }} offen · {{ detail.doneNotes }} freigegeben<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <sc-for list=\"{{ detail.notes }}\" as=\"n\" hint-placeholder-count=\"2\">\n              <div style=\"{{ n.rowStyle }}\">\n                <div style=\"display:flex; align-items:flex-start; gap:10px;\">\n                  <span style=\"{{ n.dotStyle }}\"><\u002Fspan>\n                  <textarea value=\"{{ n.text }}\" onchange=\"{{ n.onEdit }}\" readonly=\"{{ n.locked }}\" rows=\"1\" style=\"{{ n.textStyle }}\"><\u002Ftextarea>\n                  <span style=\"{{ n.kindBadgeStyle }}\">{{ n.kindLabel }}<\u002Fspan>\n                  <span style=\"{{ n.badgeStyle }}\">{{ n.stateLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ n.canDelete }}\" hint-placeholder-val=\"{{ false }}\">\n                    <button onclick=\"{{ n.onDelete }}\" title=\"Löschen (nur Partner)\" style=\"flex:none; width:26px; height:26px; border:none; background:transparent; color:#B7BCC6; cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center;\" style-hover=\"background:#FBE4DB; color:#E94E1B;\">\n                      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fbutton>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px; color:#9aa0ab; margin:2px 0 0 18px;\">von {{ n.author }}<\u002Fdiv>\n\n                <!-- comments thread -->\n                <sc-if value=\"{{ n.hasComments }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex; flex-direction:column; gap:7px; margin:10px 0 0 18px; padding-left:11px; border-left:2px solid #EBE4D2;\">\n                    <sc-for list=\"{{ n.comments }}\" as=\"c\" hint-placeholder-count=\"1\">\n                      <div>\n                        <div style=\"{{ c.metaStyle }}\">{{ c.author }}<\u002Fdiv>\n                        <div style=\"font-size:13.5px; color:#333; line-height:1.45;\">{{ c.text }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <!-- comment input + actions -->\n                <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:11px 0 0 18px;\">\n                  <input value=\"{{ n.commentDraft }}\" onchange=\"{{ n.onCommentDraft }}\" onkeydown=\"{{ n.onCommentKey }}\" placeholder=\"Kommentar hinzufügen …\" style=\"flex:1; min-width:160px; border:1.5px solid #E5E7EC; border-radius:8px; padding:7px 11px; font-family:'Aleo',sans-serif; font-size:13px; outline:none; color:#333; background:#fff;\">\n                  <button onclick=\"{{ n.addComment }}\" style=\"flex:none; font-family:'Aleo',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; color:#3A5791; background:#fff; border:1px solid #E5E7EC; border-radius:999px; padding:6px 13px;\">Kommentar<\u002Fbutton>\n                  <sc-for list=\"{{ n.actions }}\" as=\"a\" hint-placeholder-count=\"1\">\n                    <button onclick=\"{{ a.onClick }}\" style=\"{{ a.style }}\">{{ a.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- add note: beide Rollen, Typ je Rolle -->\n          <div style=\"margin-top:15px; padding-top:14px; border-top:1px solid #EEF0F3;\">\n            <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:9px;\">\n              <span style=\"font-size:12px; color:#6E6E6E;\">Typ:<\u002Fspan>\n              <sc-for list=\"{{ detail.kindOptions }}\" as=\"k\" hint-placeholder-count=\"2\">\n                <span style=\"{{ k.style }}\">{{ k.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <input value=\"{{ detail.noteDraft }}\" onchange=\"{{ detail.onNoteDraft }}\" onkeydown=\"{{ detail.onNoteKey }}\" placeholder=\"{{ detail.addPlaceholder }}\" style=\"flex:1; min-width:0; border:1.5px solid #E5E7EC; border-radius:8px; padding:10px 12px; font-family:'Aleo',sans-serif; font-size:14px; outline:none; color:#333;\">\n              <button onclick=\"{{ detail.addNote }}\" style=\"flex:none; font-family:'Aleo',sans-serif; font-size:14px; font-weight:600; cursor:pointer; color:#fff; background:#3A5791; border:none; border-radius:8px; padding:10px 18px;\" style-hover=\"background:#314a7c;\">Anlegen<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12px; color:#9aa0ab; margin-top:10px; line-height:1.5;\">Mitarbeiter erfassen <b style=\"color:#6E6E6E; font-weight:600;\">Fragen / Hinweise<\u002Fb>, der Partner <b style=\"color:#6E6E6E; font-weight:600;\">Review Notes<\u002Fb>. <b style=\"color:#6E6E6E; font-weight:600;\">Löschen<\u002Fb> und finales <b style=\"color:#6E6E6E; font-weight:600;\">Freigeben<\u002Fb> bleiben dem Partner vorbehalten.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1500,&quot;height&quot;:940}}\">\nclass Component extends DCLogic {\n  state = { employee: 'sw', role: 'mitarbeiter', openCard: null, timerRunning: false, timerSec: 0, noteDraft: '', checklistDraft: '', commentDrafts: {}, orders: this.orders() };\n  _seq = 1;\n  nextId(p) { return p + (Date.now().toString(36)) + (this._seq++); }\n  me() { return this.state.role === 'partner' ? { name:'O. Burchardt', role:'partner' } : { name:'S. Wolf', role:'mitarbeiter' }; }\n\n  componentDidMount() {\n    this._iv = setInterval(() => {\n      if (this.state.timerRunning) this.setState(s => ({ timerSec: s.timerSec + 1 }));\n    }, 1000);\n  }\n  componentWillUnmount() { clearInterval(this._iv); }\n\n  statusMeta() {\n    return {\n      av: { label:'Arbeitsvorrat',          color:'#6E6E6E', soft:'#ECEDF0' },\n      ua: { label:'Unterlagen anfordern',   color:'#E94E1B', soft:'#FBE4DB', special:true },\n      uv: { label:'Unterlagen vollständig', color:'#0080C9', soft:'#DCEFF9', special:true },\n      bb: { label:'Bearbeitung begonnen',   color:'#0080C9', soft:'#DCEFF9' },\n      rf: { label:'Reviewfähig',            color:'#F7B234', soft:'#FDEFD2' },\n      rn: { label:'Review Notes',           color:'#E94E1B', soft:'#FBE4DB' },\n      fg: { label:'Freigegeben',            color:'#3A5791', soft:'#E1E6F0' },\n      am: { label:'An Mandant übermittelt', color:'#3A5791', soft:'#E1E6F0' },\n      fa: { label:'Beim FA eingereicht',    color:'#3A5791', soft:'#E1E6F0' },\n      er: { label:'Erledigt',               color:'#2E7D5B', soft:'#DCEDE4' },\n    };\n  }\n  bucketOrder() { return ['av','ua','uv','bb','rf','rn','fg','am','fa','er']; }\n\n  artColor(art) {\n    if (art.indexOf('Jahresabschluss') > -1) return '#0080C9';\n    if (art.indexOf('Umsatzsteuer') > -1) return '#3A5791';\n    if (art.indexOf('Lohn') > -1) return '#E94E1B';\n    if (art.indexOf('Einkommensteuer') > -1) return '#7a5400';\n    if (art.indexOf('Finanzbuch') > -1) return '#2E7D5B';\n    return '#6E6E6E';\n  }\n  artShort(art) {\n    if (art.indexOf('Jahresabschluss') > -1) return 'JA';\n    if (art.indexOf('Umsatzsteuer') > -1) return 'USt';\n    if (art.indexOf('Lohn') > -1) return 'LOHN';\n    if (art.indexOf('Einkommensteuer') > -1) return 'ESt';\n    if (art.indexOf('Finanzbuch') > -1) return 'FIBU';\n    return 'A';\n  }\n\n  orders() {\n    const list = [\n      { mandant:'Praxis Dr. Wagner', art:'Jahresabschluss 2024', soll:18, monat:'Mär 2025', seiten:42, kosten:'1.840 €', status:'av', mine:true },\n      { mandant:'Müller Immobilien GmbH', art:'Jahresabschluss 2024', soll:24, monat:'Mär 2025', seiten:0, kosten:'—', status:'av', umplanung:true, mine:true },\n      { mandant:'Bäckerei Lindner', art:'Umsatzsteuer-Voranmeldung', soll:3, monat:'Feb 2025', seiten:8, kosten:'320 €', status:'av', mine:false },\n      { mandant:'Zahnärzte am Park', art:'Einkommensteuer 2024', soll:9, monat:'Apr 2025', seiten:0, kosten:'—', status:'av', mine:true },\n      { mandant:'Hotel Stadtblick', art:'Jahresabschluss 2024', soll:30, monat:'Mär 2025', seiten:0, kosten:'—', status:'ua', mine:true },\n      { mandant:'Café Central oHG', art:'Jahresabschluss 2024', soll:14, monat:'Mär 2025', seiten:0, kosten:'—', status:'ua', mine:false },\n      { mandant:'Schreinerei Voss', art:'Jahresabschluss 2024', soll:20, monat:'Feb 2025', seiten:12, kosten:'640 €', status:'uv', mine:true },\n      { mandant:'TechStart UG', art:'Finanzbuchhaltung Q1', soll:6, monat:'Feb 2025', seiten:24, kosten:'410 €', status:'bb', timeRunning:true, timeText:'01:24 h', mine:true },\n      { mandant:'Müller Immobilien GmbH', art:'Umsatzsteuer-Voranmeldung', soll:3, monat:'Feb 2025', seiten:5, kosten:'180 €', status:'bb', timeOpen:true, timeText:'2:10 h', mine:true },\n      { mandant:'Praxis Dr. Wagner', art:'Lohnbuchhaltung Januar', soll:4, monat:'Feb 2025', seiten:9, kosten:'260 €', status:'bb', mine:false },\n      { mandant:'Schreinerei Voss', art:'Umsatzsteuer-Voranmeldung', soll:3, monat:'Jan 2025', seiten:6, kosten:'190 €', status:'rf', timeOpen:true, timeText:'3:30 h', mine:true },\n      { mandant:'Bäckerei Lindner', art:'Jahresabschluss 2023', soll:16, monat:'Jan 2025', seiten:38, kosten:'1.520 €', status:'rn', mine:true, notes:[\n        { text:'Abschreibung Anlage Nr. 1240 prüfen — Nutzungsdauer korrekt?', author:'O. Burchardt', noteState:'offen', comments:[] },\n        { text:'Rückstellung Steuerberatungskosten zu niedrig angesetzt.', author:'O. Burchardt', noteState:'erledigt', comments:[\n          { text:'Rückstellung auf 2.400 € angepasst, Beleg im DMS hinterlegt.', author:'S. Wolf', role:'mitarbeiter' },\n        ] },\n        { text:'Privatanteil Kfz fehlt in der GuV.', author:'O. Burchardt', noteState:'freigegeben', comments:[\n          { text:'1%-Regelung ergänzt.', author:'S. Wolf', role:'mitarbeiter' },\n          { text:'Passt, freigegeben.', author:'O. Burchardt', role:'partner' },\n        ] },\n      ] },\n      { mandant:'Zahnärzte am Park', art:'Umsatzsteuer-Voranmeldung', soll:3, monat:'Jan 2025', seiten:7, kosten:'210 €', status:'fg', mine:false },\n      { mandant:'Café Central oHG', art:'Lohnbuchhaltung Dezember', soll:4, monat:'Dez 2024', seiten:11, kosten:'280 €', status:'am', mine:true },\n      { mandant:'TechStart UG', art:'Umsatzsteuer-Voranmeldung', soll:3, monat:'Dez 2024', seiten:5, kosten:'170 €', status:'fa', mine:false },\n      { mandant:'Hotel Stadtblick', art:'Einkommensteuer 2023', soll:8, monat:'Nov 2024', seiten:29, kosten:'920 €', status:'er', mine:true },\n    ];\n    return list.map((o, i) => {\n      const base = Object.assign({ id:'o'+i }, o);\n      base.checklist = (o.checklist || this.defaultChecklist(o)).map((c, j) => Object.assign({ id:'c'+i+'_'+j }, c));\n      base.notes = (o.notes || []).map((n, j) => Object.assign({ id:'n'+i+'_'+j, noteState: n.noteState || 'offen', kind: n.kind || 'review' }, n, {\n        comments: (n.comments || []).map((c, k) => Object.assign({ id:'cm'+i+'_'+j+'_'+k }, c)),\n      }));\n      return base;\n    });\n  }\n\n  kindMeta(k) {\n    if (k === 'frage') return { label:'Frage / Hinweis', color:'#0080C9', soft:'#DCEFF9' };\n    return { label:'Review Note', color:'#3A5791', soft:'#E1E6F0' };\n  }\n\n  noteStateMeta(s) {\n    if (s === 'erledigt') return { label:'Erledigt – wartet auf Freigabe', color:'#0080C9', soft:'#DCEFF9' };\n    if (s === 'freigegeben') return { label:'Freigegeben', color:'#2E7D5B', soft:'#DCEDE4' };\n    return { label:'Offen', color:'#B5791A', soft:'#FDEFD2' };\n  }\n\n  defaultChecklist(o) {\n    if (o.status === 'ua' || o.status === 'uv' || o.art.indexOf('Jahresabschluss') > -1) {\n      return [\n        { label:'Summen- & Saldenliste', done:true },\n        { label:'Kontonachweise', done:true },\n        { label:'Inventar / Bestände', done:false },\n        { label:'Anlagenverzeichnis', done:false },\n      ];\n    }\n    return [];\n  }\n\n  updateOpen(mut) {\n    const ocId = this.state.openCard;\n    this.setState(st => ({ orders: st.orders.map(x => x.id === ocId ? mut(Object.assign({}, x)) : x) }));\n  }\n\n  _addNote(ocId) {\n    const txt = (this.state.noteDraft || '').trim();\n    if (!txt) return;\n    const nid = this.nextId('n');\n    const me = this.me();\n    const kind = me.role === 'partner' ? 'review' : 'frage';\n    this.setState(st => ({ noteDraft: '', orders: st.orders.map(x => x.id === ocId ? Object.assign({}, x, { notes: [...x.notes, { id:nid, text:txt, author:me.name, kind:kind, noteState:'offen', comments:[] }] }) : x) }));\n  }\n  _addComment(ocId, noteId) {\n    const txt = ((this.state.commentDrafts || {})[noteId] || '').trim();\n    if (!txt) return;\n    const me = this.me();\n    const cid = this.nextId('cm');\n    this.setState(st => {\n      const cd = Object.assign({}, st.commentDrafts); delete cd[noteId];\n      return { commentDrafts: cd, orders: st.orders.map(x => x.id === ocId ? Object.assign({}, x, {\n        notes: x.notes.map(n => n.id === noteId ? Object.assign({}, n, { comments: [...n.comments, { id:cid, text:txt, author:me.name, role:me.role }] }) : n),\n      }) : x) };\n    });\n  }\n  _setNoteState(ocId, noteId, s) {\n    this.setState(st => ({ orders: st.orders.map(x => x.id === ocId ? Object.assign({}, x, {\n      notes: x.notes.map(n => n.id === noteId ? Object.assign({}, n, { noteState: s }) : n),\n    }) : x) }));\n  }\n  _deleteNote(ocId, noteId) {\n    this.setState(st => ({ orders: st.orders.map(x => x.id === ocId ? Object.assign({}, x, { notes: x.notes.filter(n => n.id !== noteId) }) : x) }));\n  }\n  _addCheck(ocId) {\n    const txt = (this.state.checklistDraft || '').trim();\n    if (!txt) return;\n    const cid = this.nextId('c');\n    this.setState(st => ({ checklistDraft: '', orders: st.orders.map(x => x.id === ocId ? Object.assign({}, x, { checklist: [...x.checklist, { id:cid, label:txt, done:false }] }) : x) }));\n  }\n\n  buildCard(o) {\n    return {\n      onOpen: () => this.setState({ openCard: o.id }),\n      mandant: o.mandant, art: o.art,\n      artShort: this.artShort(o.art), artColor: this.artColor(o.art),\n      chips: [ 'Soll ' + o.soll + ' h', o.monat, o.seiten + ' S.', o.kosten ],\n      timeRunning: !!o.timeRunning, timeOpen: !!o.timeOpen, timeText: o.timeText || '',\n      freigabe: !!o.umplanung,\n      reviewNote: !!(o.notes && o.notes.some(n => n.noteState !== 'freigegeben')),\n      reviewCount: o.notes ? o.notes.filter(n => n.noteState !== 'freigegeben').length : 0,\n    };\n  }\n\n  today() {\n    const entries = [\n      { mandant:'TechStart UG', h:1.4 },\n      { mandant:'Müller Immobilien GmbH', h:2.1 },\n      { mandant:'Praxis Dr. Wagner', h:1.0 },\n    ];\n    const ist = entries.reduce((a,e)=>a+e.h, 0);\n    return { entries, ist, soll: 8 };\n  }\n\n  renderVals() {\n    const orders = this.state.orders;\n    const SM = this.statusMeta();\n    const emp = this.state.employee;\n\n    const nav = [\n      { label:'Board', active:true },\n      { label:'Meine Zeiten', active:false },\n      { label:'Freigaben', active:false },\n    ].map(n => ({ label:n.label, style:\n      \"font-size:14.5px; font-weight:\" + (n.active?'600':'500') + \"; padding:7px 14px; border-radius:999px; cursor:pointer; \" +\n      (n.active ? \"background:#F2F4F8; color:#3A5791;\" : \"color:#333;\") }));\n\n    const kpis = [\n      { big:'15', label:'zugeteilt', tone:'#333333' },\n      { big:'3',  label:'in Bearbeitung', tone:'#0080C9' },\n      { big:'2',  label:'Zeiten offen', tone:'#E94E1B' },\n      { big:'1',  label:'Review Notes', tone:'#F7B234' },\n    ];\n\n    const empList = [\n      { id:'sw', name:'S. Wolf', initials:'SW' },\n      { id:'mk', name:'M. Klein', initials:'MK' },\n      { id:'tb', name:'T. Berg', initials:'TB' },\n      { id:'team', name:'Mein Team', initials:'∗' },\n    ];\n    const employees = empList.map(e => ({\n      name:e.name, initials:e.initials, count: e.id==='team' ? orders.length : orders.filter(o=>o.mine).length,\n      onClick: () => this.setState({ employee:e.id }),\n      style: \"display:flex; align-items:center; gap:9px; cursor:pointer; font-size:14px; border-radius:9px; padding:6px 9px; \" +\n        (emp===e.id ? \"background:#EAF4FB; color:#0080C9; font-weight:600;\" : \"color:#333;\"),\n      avatarStyle: \"flex:none; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; background:\" + (emp===e.id ? '#0080C9' : '#B7BCC6') + \";\",\n    }));\n\n    const artFilters = [\n      { label:'Jahresabschluss', on:true },\n      { label:'Umsatzsteuer', on:true },\n      { label:'Lohn', on:false },\n      { label:'Einkommensteuer', on:false },\n    ].map(a => ({\n      label:a.label, mark: a.on ? '✓' : '',\n      box: \"flex:none; width:18px; height:18px; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; border:1.5px solid \" +\n        (a.on ? '#0080C9' : '#D4D9E2') + \"; background:\" + (a.on ? '#0080C9' : '#fff') + \";\",\n    }));\n\n    const columns = this.bucketOrder().map(id => {\n      const m = SM[id];\n      const cards = orders.filter(o => o.status === id).map(o => this.buildCard(o));\n      return { label:m.label, color:m.color, soft:m.soft, special:!!m.special, count:cards.length, cards };\n    });\n\n    const t = this.today();\n    const pct = Math.min(100, Math.round((t.ist / t.soll) * 100));\n    const todaySum = {\n      ist: t.ist.toFixed(1).replace('.', ','), soll: t.soll.toFixed(1).replace('.', ','),\n      rest: (t.soll - t.ist).toFixed(1).replace('.', ','),\n      barStyle: \"height:100%; width:\" + pct + \"%; background:\" + (pct>=100?'#2E7D5B':'#0080C9') + \"; border-radius:999px;\",\n      entries: t.entries.map(e => ({ mandant:e.mandant, h: e.h.toFixed(1).replace('.', ',') + ' h' })),\n    };\n\n    const openTimes = orders.filter(o => o.timeOpen || o.timeRunning || o.status==='bb').map(o => ({\n      mandant:o.mandant, art:o.art,\n      text: o.timeRunning ? (o.timeText + ' läuft') : (o.timeOpen ? (o.timeText + ' nicht freigegeben') : 'keine Zeit erfasst'),\n    }));\n    const reviewItems = orders.filter(o => o.notes && o.notes.some(n => n.noteState !== 'freigegeben')).map(o => ({\n      mandant:o.mandant, art:o.art, count: o.notes.filter(n=>n.noteState!=='freigegeben').length + ' offen',\n      onOpen: () => this.setState({ openCard:o.id }),\n    }));\n\n    // timer\n    const s = this.state.timerSec;\n    const pad = n => (n<10?'0':'') + n;\n    const timer = {\n      text: pad(Math.floor(s/3600)) + ':' + pad(Math.floor((s%3600)/60)) + ':' + pad(s%60),\n      running: this.state.timerRunning,\n      toggleLabel: this.state.timerRunning ? 'Pause' : 'Start',\n      toggleStyle: \"flex:1; display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Aleo',sans-serif; font-weight:600; font-size:15px; cursor:pointer; color:#fff; border:none; border-radius:999px; padding:11px; background:\" + (this.state.timerRunning ? '#E94E1B' : '#0080C9') + \";\",\n      toggle: () => this.setState(x => ({ timerRunning: !x.timerRunning })),\n      reset: () => this.setState({ timerRunning:false, timerSec:0 }),\n      transfer: () => this.setState({ timerRunning:false }),\n      transferText: (s/3600).toFixed(2).replace('.', ',') + ' h',\n    };\n\n    // detail\n    const oc = orders.find(o => o.id === this.state.openCard);\n    const istStd = 3.5, sollNum = oc ? oc.soll : 0;\n    const stdPct = oc ? Math.min(100, Math.round((istStd / sollNum) * 100)) : 0;\n    const detail = oc ? {\n      mandant: oc.mandant, art: oc.art, artShort: this.artShort(oc.art), artColor: this.artColor(oc.art),\n      statusLabel: SM[oc.status].label, statusColor: SM[oc.status].color, statusSoft: SM[oc.status].soft,\n      soll: oc.soll + ' h',\n      meta: [\n        { k:'Auftrags-Nr.', v:'A-2025-' + (1000 + oc.mandant.length*7) },\n        { k:'Mandanten-Nr.', v:'D' + (10200 + oc.mandant.length) },\n        { k:'Geplanter Monat', v:oc.monat },\n        { k:'Verantw. Partner', v:'O. Burchardt' },\n        { k:'Bearbeiter', v:'S. Wolf' },\n      ],\n      monat: oc.monat, seiten: oc.seiten + ' Seiten', kosten: oc.kosten,\n      istStd: istStd.toFixed(1).replace('.', ',') + ' h', stdPct,\n      stdBarStyle: 'height:100%; width:' + stdPct + '%; background:' + (stdPct>=100?'#E94E1B':'#0080C9') + '; border-radius:999px;',\n      restStd: (sollNum - istStd).toFixed(1).replace('.', ',') + ' h',\n      statusOptions: this.bucketOrder().map(id => ({\n        label: SM[id].label, active: id === oc.status,\n        onClick: () => this.setState(st => ({ orders: st.orders.map(x => x.id===oc.id ? Object.assign({}, x, { status:id }) : x) })),\n        style: \"cursor:pointer; font-size:12.5px; font-weight:\" + (id===oc.status?'600':'500') + \"; border-radius:999px; padding:5px 12px; white-space:nowrap; border:1px solid \" +\n          (id===oc.status ? SM[id].color : '#E5E7EC') + \"; background:\" + (id===oc.status ? SM[id].color : '#fff') + \"; color:\" + (id===oc.status ? '#fff' : '#6E6E6E') + \";\",\n      })),\n      // ---- Review Notes (Rollen + Thread) ----\n      isPartner: this.state.role === 'partner',\n      notPartner: this.state.role !== 'partner',\n      openNotes: oc.notes.filter(n => n.noteState !== 'freigegeben').length,\n      doneNotes: oc.notes.filter(n => n.noteState === 'freigegeben').length,\n      hasNotes: oc.notes.length > 0,\n      noteDraft: this.state.noteDraft,\n      onNoteDraft: (e) => this.setState({ noteDraft: e.target.value }),\n      onNoteKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this._addNote(oc.id); } },\n      addNote: () => this._addNote(oc.id),\n      addPlaceholder: this.state.role === 'partner' ? 'Neue Review Note erfassen …' : 'Frage oder Hinweis erfassen …',\n      kindOptions: [\n        { id:'frage', allowed: this.state.role !== 'partner' },\n        { id:'review', allowed: this.state.role === 'partner' },\n      ].map(k => {\n        const m = this.kindMeta(k.id);\n        return { label: m.label, allowed: k.allowed,\n          style: \"font-size:12px; font-weight:600; border-radius:999px; padding:5px 13px; border:1px solid \" +\n            (k.allowed ? m.color : '#E5E7EC') + \"; background:\" + (k.allowed ? m.soft : '#F8F9FB') + \"; color:\" +\n            (k.allowed ? m.color : '#C2C6CE') + \";\" + (k.allowed ? \"\" : \" cursor:not-allowed;\"),\n        };\n      }),\n      notes: oc.notes.map(n => {\n        const sm = this.noteStateMeta(n.noteState);\n        const km = this.kindMeta(n.kind);\n        const locked = n.noteState === 'freigegeben';\n        const isPartner = this.state.role === 'partner';\n        const actions = [];\n        const primaryBtn = (label, color, onClick) => ({ label, onClick, style: \"font-family:'Aleo',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; color:#fff; background:\" + color + \"; border:none; border-radius:999px; padding:6px 14px;\" });\n        const ghostBtn = (label, onClick) => ({ label, onClick, style: \"font-family:'Aleo',sans-serif; font-size:12.5px; font-weight:600; cursor:pointer; color:#6E6E6E; background:#fff; border:1px solid #E5E7EC; border-radius:999px; padding:6px 14px;\" });\n        if (isPartner) {\n          if (n.noteState !== 'freigegeben') actions.push(primaryBtn('Freigeben', '#2E7D5B', () => this._setNoteState(oc.id, n.id, 'freigegeben')));\n          if (n.noteState === 'erledigt') actions.push(ghostBtn('Zurück an Mitarbeiter', () => this._setNoteState(oc.id, n.id, 'offen')));\n          if (n.noteState === 'freigegeben') actions.push(ghostBtn('Wieder öffnen', () => this._setNoteState(oc.id, n.id, 'offen')));\n        } else {\n          if (n.noteState === 'offen') actions.push(primaryBtn('Als erledigt melden', '#0080C9', () => this._setNoteState(oc.id, n.id, 'erledigt')));\n          if (n.noteState === 'erledigt') actions.push(ghostBtn('Doch nicht erledigt', () => this._setNoteState(oc.id, n.id, 'offen')));\n        }\n        return {\n          text: n.text, author: n.author || 'Partner',\n          kindLabel: km.label,\n          kindBadgeStyle: \"flex:none; font-size:10.5px; font-weight:700; color:\" + km.color + \"; background:\" + km.soft + \"; border-radius:999px; padding:2px 9px; white-space:nowrap;\",\n          stateLabel: sm.label,\n          badgeStyle: \"flex:none; font-size:11px; font-weight:600; color:\" + sm.color + \"; background:\" + sm.soft + \"; border-radius:999px; padding:2px 9px; white-space:nowrap;\",\n          dotStyle: \"flex:none; margin-top:6px; width:8px; height:8px; border-radius:50%; background:\" + sm.color + \";\",\n          rowStyle: \"border:1px solid \" + (locked ? '#E5E7EC' : '#EBD9A8') + \"; background:\" + (locked ? '#F8F9FB' : '#FFFCF4') + \"; border-radius:12px; padding:12px 13px;\",\n          locked: locked,\n          textStyle: \"width:100%; box-sizing:border-box; border:none; background:transparent; resize:none; font-family:'Aleo',sans-serif; font-size:14px; line-height:1.45; outline:none; color:\" + (locked ? '#6E6E6E' : '#333') + \";\",\n          onEdit: (e) => this.updateOpen(x => Object.assign({}, x, { notes: x.notes.map(m => m.id===n.id ? Object.assign({}, m, { text: e.target.value }) : m) })),\n          canDelete: isPartner,\n          onDelete: () => this._deleteNote(oc.id, n.id),\n          actions: actions,\n          hasComments: n.comments.length > 0,\n          comments: n.comments.map(c => ({\n            text: c.text, author: c.author,\n            metaStyle: \"font-size:11.5px; font-weight:700; margin-bottom:2px; color:\" + (c.role==='partner' ? '#3A5791' : '#0080C9') + \";\",\n          })),\n          commentDraft: (this.state.commentDrafts || {})[n.id] || '',\n          onCommentDraft: (e) => { const v = e.target.value; this.setState(st => ({ commentDrafts: Object.assign({}, st.commentDrafts, { [n.id]: v }) })); },\n          onCommentKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this._addComment(oc.id, n.id); } },\n          addComment: () => this._addComment(oc.id, n.id),\n        };\n      }),\n      // ---- Checkliste (editierbar) ----\n      checklistDraft: this.state.checklistDraft,\n      onChecklistDraft: (e) => this.setState({ checklistDraft: e.target.value }),\n      onChecklistKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); this._addCheck(oc.id); } },\n      addChecklistItem: () => this._addCheck(oc.id),\n      checklist: oc.checklist.map(u => ({\n        label:u.label, mark: u.done ? '✓' : '',\n        boxStyle: 'flex:none; width:18px; height:18px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; cursor:pointer; border:1.5px solid ' + (u.done ? '#2E7D5B' : '#D4D9E2') + '; background:' + (u.done ? '#2E7D5B' : '#fff') + ';',\n        textStyle: u.done ? 'flex:1; color:#9aa0ab; text-decoration:line-through; font-size:14px;' : 'flex:1; color:#333; font-size:14px;',\n        onToggle: () => this.updateOpen(x => Object.assign({}, x, { checklist: x.checklist.map(c => c.id===u.id ? Object.assign({}, c, { done: !c.done }) : c) })),\n        onDelete: () => this.updateOpen(x => Object.assign({}, x, { checklist: x.checklist.filter(c => c.id!==u.id) })),\n      })),\n      times: [\n        { datum:'19.06.', dauer:'2:10 h', status:'freigegeben', badgeStyle:'flex:none; font-size:11px; font-weight:700; color:#fff; background:#2E7D5B; border-radius:999px; padding:2px 9px;' },\n        { datum:'20.06.', dauer:'1:24 h', status:'nicht freigegeben', badgeStyle:'flex:none; font-size:11px; font-weight:700; color:#7a5400; background:#FDEFD2; border-radius:999px; padding:2px 9px;' },\n      ],\n      close: () => this.setState({ openCard:null, timerRunning:false }),\n    } : null;\n\n    const isPartner = this.state.role === 'partner';\n    const me = this.me();\n    const roleTabs = [\n      { id:'mitarbeiter', label:'Mitarbeiter' },\n      { id:'partner', label:'Partner' },\n    ].map(r => ({\n      label: r.label,\n      onClick: () => this.setState({ role: r.id }),\n      style: \"font-size:13px; font-weight:600; padding:5px 13px; border-radius:999px; cursor:pointer; transition:160ms; \" +\n        (this.state.role===r.id ? \"background:#fff; color:#3A5791; box-shadow:0 1px 2px rgba(20,28,48,0.10);\" : \"background:transparent; color:#6E6E6E;\"),\n    }));\n\n    return {\n      nav, kpis, employees, artFilters, columns,\n      todaySum, openTimes, reviewItems, timer,\n      roleTabs, meName: me.name, meRole: isPartner ? 'Partner' : 'Sachbearbeiterin', meInitials: isPartner ? 'OB' : 'SW',\n      detail, hasDetail: !!detail, stop: (ev)=>ev.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
